- name: Config workstation - mise - mise use node (env_user, all)
  # become: true
  # become_user: "{{ env_user }}"
  ansible.builtin.shell: >
    eval "$(mise activate zsh)" && mise use --global node@latest
  args:
    executable: /bin/zsh
    # creates: "{{ ansible_facts['env']['HOME'] }}/.local/share/mise/installs/node/{{ node_version.stdout }}"
  register: mise_install_result
  changed_when: mise_install_result.rc == 0
  failed_when:
    - mise_install_result.rc != 0
    - "'already installed' not in mise_install_result.stderr"
    - "'definition not found' not in mise_install_result.stderr"

# ----------------------------
# Install yaml-language-server
- name: Node - Install packages via npm - benutzerweit (env_user, all)
  # become: true
  # become_user: "{{ env_user }}"
  community.general.npm:
    name: yaml-language-server
    global: true
    # path: "/home/{{ env_user }}"
    state: present
