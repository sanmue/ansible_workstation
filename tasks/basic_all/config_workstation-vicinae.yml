- name: Config workstation - Vicinae - install vicinae extensions (Arch)
  community.general.npm:
    path: "{{ repo_dest_dir }}/extensions/{{ item }}"
    state: present
    production: true
    ignore_scripts: true
  loop: "{{ extensions | default([]) }}"
  when:
    - ansible_facts['distribution'] in ["Archlinux"]
    - extensions | default([]) | length > 0

- name: Config workstation - Vicinae - check if build output exists (Arch)
  ansible.builtin.stat:
    path: "{{ repo_dest_dir }}/extensions/{{ item }}/dist"
    get_checksum: false
  register: build_dir_stat
  changed_when: false
  loop: "{{ extensions | default([]) }}"
  when:
    - ansible_facts['distribution'] in ["Archlinux"]
    - extensions | default([]) | length > 0

- name: Config workstation - Vicinae - run npm build only if needed (Arch)
  ansible.builtin.command: npm run build
  args:
    chdir: "{{ repo_dest_dir }}/extensions/{{ item }}"
  loop: "{{ extensions | default([]) }}"
  when:
    - ansible_facts['distribution'] in ["Archlinux"]
    - extensions | default([]) | length > 0
    - not build_dir_stat.results[extensions.index(item)].stat.exists
  register: build_result
  changed_when:
    - build_result.rc == 0
    - "'Build successful' in build_result.stdout"

- name: Config workstation - Vicinae - restart service for env_user (Arch)
  tags: upvic
  become: true
  become_user: "{{ env_user }}"
  ansible.builtin.systemd_service:
    name: vicinae
    state: restarted
    scope: user
  when:
    - ansible_facts['distribution'] in ["Archlinux"]
