- name: Fonts - Build font information cache files for apps using fontconfig (all)
  ansible.builtin.command: fc-cache -fv
  register: fc_cache_result
  failed_when: "'fc-cache: succeeded' not in fc_cache_result.stdout"
  changed_when: "'caching, new cache contents:' in fc_cache_result.stdout"
  when: ansible_facts['distribution'] in ["Archlinux"]
