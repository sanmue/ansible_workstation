- name: Gnome - Install packages for workstations - 1 (Archlinux + Gnome)
  ansible.builtin.package:
    state: present
    name:
      # - alacarte # Menu editor for gnome
      - baobab # A graphical directory tree analyzer
      # - celluloid # Simple GTK+ frontend for mpv # currently used for iptv streaming # flatpak
      # - dconf-editor # flatpak
      # - file-roller # Create and modify archives # flatpak
      # - gedit # flatpak
      # - gedit-plugins
      - gjs # Javascript Bindings for GNOME # + Ubnuntu: fehlendes Paket, damit ab 22.04 der Monitor in Engergiesparmodus kann
      # (Bildschirmausgabe wird ausgeschaltet nach längerer Inktivität)
      # - gnome-calculator # flatpak
      - gnome-disk-utility
      - gnome-epub-thumbnailer # (u.a. wg. nnn)
      # - gnome-firmware # flatpak
      - gnome-keyring # already installed
      # - gnome-terminal
      # - gnome-weather # needed for gnome shell extension "Weather O'Clock" # flatpak
      # - inkscape # Plasma: Krita # flatpak
      - libgda6 # needed for gnome shell extension "Copyous"
      # - papers # Document viewer for PDF and other document formats aimed at the GNOME desktop # flatpak
      - papirus-icon-theme
      # - pdfarranger # Merge, split, rotate, and crop PDF files # flatpak
      # - rhythmbox  # flatpak
      # - seahorse # "Passwords and Keys" # bereits standardmäßig installiert # flatpak
      # - showtime # Video player for GNOME ("distraction-free") # flatpak
      # - solaar # Linux device manager for a wide range of Logitech devices # flatpak
  when:
    - ansible_facts['distribution'] in ["Archlinux"]
    - env_desktop in ["gnome"]

- name: Gnome - Install packages for workstations - 2 (Archlinux + Gnome)
  ansible.builtin.package:
    state: present
    name:
      - dconf # already installed
      # - decibels # Simple audio player for GNOME # flatpak
      # - deluge # -> transmission-gtk
      # - epiphany # A GNOME web browser based on the WebKit rendering engin # flatpak
      # - guake # Drop-down terminal for GNOME
      # - gtk-vnc # VNC viewer widget for GTK
      - nemo
      - nemo-share
      # - nemo-terminal
      - orchis-theme
      # - pycharm-community-edition # Python IDE
      # - solanum # Pomodoro timer for the GNOME desktop # flatpak
      # - transmission-cli
      # - transmission-gtk # flatpak
  when:
    - ansible_facts['distribution'] in ["Archlinux"]
    - env_desktop == "gnome"
