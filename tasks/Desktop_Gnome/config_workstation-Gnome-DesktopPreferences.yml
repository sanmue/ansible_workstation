# ### Gnome Epiphany (Web Browser)

# - name: Gnome Desktop - Preferences - Set gnome - epiphany - aks-for-default (Gnome)
#   community.general.dconf:
#     key: "/org/gnome/epiphany/ask-for-default"
#     value: "false"
#     state: present
#   when:
#     - env_desktop in ["gnome"]

- name: Gnome Desktop - Preferences - Set gnome - epiphany - aks-for-default (Gnome)
  become: true
  become_user: "{{ env_user }}"
  ansible.builtin.command: dconf write "/org/gnome/epiphany/ask-for-default" "false"
  when:
    - env_desktop in ["gnome"]
  register: command_dconf_changed
  changed_when: command_dconf_changed.rc == 0

